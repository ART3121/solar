name: Release YANC binaries

# Builds the YANC binaries on BOTH a Windows runner (MSYS2 + MinGW-w64 -> .exe,
# packaged as a .zip) and an Ubuntu runner (native gcc -> bare binaries,
# packaged as a .tar.gz), and publishes both as release assets.
#
# Usage:
#   - Pushing a v* tag (e.g. git tag v5.0 && git push origin v5.0) runs the
#     workflow automatically, creates a "YANC v5.0" release, and attaches both
#     yanc-bin-v5.0.zip (Windows) and yanc-bin-linux-v5.0.tar.gz (Linux) to it.
#   - workflow_dispatch runs without creating a release; both archives are
#     uploaded as artifacts for inspection.
#
# Aurora consumes the asset via components/Scripts/download-yanc.js,
# which pins the expected tag (update it there when a new tag goes up).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup MSYS2 (mingw64 + bison + flex)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            make
            bison
            flex
            zip

      - name: Build binaries
        shell: msys2 {0}
        # Build all seven binaries through the top-level Makefile (single source
        # of truth, shared with the go_*.bat flows). $(OS)=Windows_NT here, so
        # the Makefile emits .exe; BIN=out/bin lands them where the packaging
        # steps below expect them.
        run: |
          set -euo pipefail
          make BIN=out/bin
          ls -l out/bin

      - name: Stage HDL + Macros + Header
        shell: msys2 {0}
        # Bundle the SAPHO runtime assets alongside the binaries. Aurora
        # downloads the zip and extracts it into components/, so each
        # staged folder lands directly at components/<folder>/ without
        # any extra code on the Aurora side.
        #
        #   HDL/     — Verilog modules (processor/core/ula/...)
        #   Macros/  — CMM float LUTs and helpers (sourced from
        #              Compilers/CMMComp/Includes/)
        #   Header/  — CPPComp standard-library shims that .cpp programs
        #              #include (Compilers/CPPComp/Includes/)
        #
        # Scripts/ is NOT shipped: Aurora manages its own scripts
        # (copy-components.js, download-*.js, ...). The gtkwave init Tcls /
        # fix.vcd path was replaced by gen_gtkw emitting a static .gtkw.
        run: |
          set -euo pipefail
          cp -r HDL                          out/HDL
          cp -r Compilers/CMMComp/Includes   out/Macros
          cp -r Compilers/CPPComp/Includes   out/Header
          ls -l out

      - name: Determine artifact name
        id: artifact
        shell: bash
        # On a tag push, GITHUB_REF_NAME is the tag (e.g. v1). On
        # workflow_dispatch it is the branch (e.g. main); we use the
        # label 'manual' in that case to make clear it is not an
        # official release.
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=yanc-bin-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=manual" >> "$GITHUB_OUTPUT"
            echo "name=yanc-bin-manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        shell: msys2 {0}
        run: |
          set -euo pipefail
          cd out
          # Zip bin/, HDL/, Macros/ and Header/ — extracting into
          # components/ produces components/{bin,HDL,Macros,Header}/,
          # which is exactly the layout Aurora expects.
          zip -r "../${{ steps.artifact.outputs.name }}.zip" \
              bin HDL Macros Header
          ls -la "../${{ steps.artifact.outputs.name }}.zip"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}.zip
          retention-days: 14

      - name: Create release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          name: 'YANC ${{ github.ref_name }}'
          generate_release_notes: true
          # The Linux binaries (yanc-bin-linux-<tag>.tar.gz) are attached to
          # this same release by the build-linux job, which `needs: build` so
          # the release already exists by the time it uploads.
          body: |
            **YANC ${{ github.ref_name }}** — prebuilt binaries for both platforms:

            - `yanc-bin-${{ github.ref_name }}.zip` — Windows (MSYS2 / MinGW-w64) `.exe`
            - `yanc-bin-linux-${{ github.ref_name }}.tar.gz` — Linux x86-64

            See `CHANGELOG.md` for the full list of changes in this release; the
            auto-generated notes below list every commit since the previous tag.
          files: |
            ${{ steps.artifact.outputs.name }}.zip

  # Linux counterpart of the build job: compiles the same binaries with native
  # gcc on Ubuntu, packages them as a .tar.gz, and (on a tag push) attaches the
  # archive to the release the Windows job already created. `needs: build`
  # serialises the two so they never race on creating the release.
  build-linux:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc make bison flex

      - name: Build binaries
        # Same shared Makefile as the Windows job. $(OS) is not Windows_NT here,
        # so the Makefile emits bare (no .exe) binaries into out/bin.
        run: |
          set -euo pipefail
          make BIN=out/bin
          ls -l out/bin

      - name: Stage HDL + Macros + Header
        run: |
          set -euo pipefail
          cp -r HDL                          out/HDL
          cp -r Compilers/CMMComp/Includes   out/Macros
          cp -r Compilers/CPPComp/Includes   out/Header
          ls -l out

      - name: Determine artifact name
        id: artifact
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            echo "name=yanc-bin-linux-${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "name=yanc-bin-linux-manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Package
        run: |
          set -euo pipefail
          cd out
          # Mirror the Windows layout: bin/, HDL/, Macros/, Header/ at the
          # archive root.
          tar -czf "../${{ steps.artifact.outputs.name }}.tar.gz" \
              bin HDL Macros Header
          ls -la "../${{ steps.artifact.outputs.name }}.tar.gz"

      - name: Upload artifact (always)
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}.tar.gz
          retention-days: 14

      - name: Attach to release (tag pushes only)
        if: startsWith(github.ref, 'refs/tags/')
        # files only: append the tarball to the existing release without
        # touching its name / body / generated notes (set by the build job).
        uses: softprops/action-gh-release@v3
        with:
          files: |
            ${{ steps.artifact.outputs.name }}.tar.gz
