name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: solar-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.compiler }} debug
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install build and integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            cmake make flex bison gcc clang iverilog yosys verilator \
            python3
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Verify release installation
        if: matrix.compiler == 'gcc'
        run: |
          cmake -S . -B build-release \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_INSTALL_PREFIX="$RUNNER_TEMP/solar-install"
          cmake --build build-release --parallel 2
          cmake --install build-release
          "$RUNNER_TEMP/solar-install/bin/solar" --version

      - name: Build release archive
        if: matrix.compiler == 'gcc'
        run: cmake --build build-release --target package --parallel 2

  cocotb-integration:
    name: cocotb 2.x with Verilator 5.036
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      VERILATOR_COMMIT: eca2b4c9603554a6a4596befd485c3dd4f550769
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            autoconf bison cmake flex g++ gcc git help2man libfl-dev \
            make perl python3 python3-venv zlib1g-dev
      - name: Build pinned Verilator
        run: |
          git init "$RUNNER_TEMP/verilator-source"
          git -C "$RUNNER_TEMP/verilator-source" remote add origin \
            https://github.com/verilator/verilator.git
          git -C "$RUNNER_TEMP/verilator-source" fetch --depth 1 origin \
            "$VERILATOR_COMMIT"
          git -C "$RUNNER_TEMP/verilator-source" checkout --detach FETCH_HEAD
          cd "$RUNNER_TEMP/verilator-source"
          autoconf
          ./configure --prefix="$RUNNER_TEMP/verilator"
          make -j2
          make install
          echo "$RUNNER_TEMP/verilator/bin" >> "$GITHUB_PATH"
      - name: Install cocotb 2.x
        run: |
          python3 -m venv "$RUNNER_TEMP/solar-python"
          "$RUNNER_TEMP/solar-python/bin/python" -m pip install \
            --disable-pip-version-check 'cocotb>=2,<3'
          echo "$RUNNER_TEMP/solar-python/bin" >> "$GITHUB_PATH"
      - name: Build Solar
        run: |
          verilator --version
          cmake -S . -B build-cocotb -DCMAKE_BUILD_TYPE=Debug
          cmake --build build-cocotb --parallel 2
      - name: Run real cocotb integration
        run: |
          ctest --test-dir build-cocotb --output-on-failure \
            -R '^integration_verilator_cocotb$'

  sanitizers:
    name: ASan and UBSan
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      ASAN_OPTIONS: detect_leaks=0:halt_on_error=1
      UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install build and integration dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends \
            cmake make flex bison gcc iverilog yosys
      - name: Configure
        run: |
          cmake -S . -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DSOLAR_ENABLE_SANITIZERS=ON
      - name: Build
        run: cmake --build build-asan --parallel 2
      - name: Test
        run: ctest --test-dir build-asan --output-on-failure
      - name: LeakSanitizer for Solar-owned processes
        env:
          ASAN_OPTIONS: detect_leaks=1:halt_on_error=1
        run: ctest --test-dir build-asan --output-on-failure -E yanc
