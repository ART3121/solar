name: Feature proposal
description: Propose a focused Solar orchestration capability
title: "proposal: "
labels: [enhancement, discussion]
body:
  - type: markdown
    attributes:
      value: |
        Broad ideas should begin in Discussions. Solar orchestrates established EDA tools and remains a small native Core plus thin CLI.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the user workflow that cannot be completed today.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: State observable behavior without prescribing an unrelated rewrite.
    validations:
      required: true
  - type: textarea
    id: boundary
    attributes:
      label: Core/backend/CLI boundary
      description: Identify the likely Solar service and established external tool involved.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope confirmation
      options:
        - label: This does not ask Solar to reimplement an HDL compiler, simulator, synthesizer, viewer, or editor.
          required: true
